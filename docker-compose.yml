services:
  nginx:
    image: nginx:1.27-alpine
    user: "nginx:nginx"
    volumes:
      - ./nginx/root-domain.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public/:/usr/share/nginx/html/:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /run/:rw,uid=101,gid=101,mode=0755
      - /var/cache/nginx/:rw,uid=101,gid=101,mode=0755
    networks:
      - private
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2026.2.0
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    networks:
      - private
      - egress
    depends_on:
      - nginx
    restart: unless-stopped

networks:
  private:
    internal: true
  egress:
